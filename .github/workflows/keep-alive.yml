name: Keep Magic Alive

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Magic Web
        run: |
          # Pinging the live Magic Studio instance on Render
          curl -sL https://magic-website-4gi7.onrender.com || echo "Web ping failed, instance might be sleeping"

      - name: Ping Magic Backend
        run: |
          # Pinging the API layer to ensure the full orchestration stays active
          curl -sL https://magic-website-4gi7.onrender.com/api/magic/ || echo "Backend ping failed, instance might be sleeping"
