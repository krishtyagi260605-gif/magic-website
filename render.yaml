services:
  # Backend Service (FastAPI)
  - type: web
    name: magic-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/magic/
    envVars:
      - key: PORT
        value: 8000

  # Frontend Service (Next.js)
  - type: web
    name: magic-web
    env: docker
    dockerContext: .
    dockerfilePath: apps/web/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: magic-backend
          type: web
          property: host
